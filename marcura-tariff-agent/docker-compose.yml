version: "3.9"

services:
  harbourmind-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harbourmind_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount source for hot-reload during development
      - .:/app
      # Persist uploaded tariff documents
      - tariff_data:/app/data
    restart: unless-stopped

    # TODO: Add a vector-store or database service here when needed, e.g.:
    # depends_on:
    #   - postgres

volumes:
  tariff_data:
